##############################################################################
# nginx/gateway.conf
#
# nginx reverse-proxy configuration for vm-gateway (10.0.1.4 / public IP).
#
# This file is the "reference copy" kept in the repo.
# The setup-gateway.sh startup script writes an identical config to
# /etc/nginx/sites-available/gateway.conf at VM boot time.
#
# Architecture:
#   Internet
#     │  port 80
#     ▼
#   vm-gateway (10.0.1.4, public IP)
#     │  nginx proxy_pass
#     │  internal subnet 10.0.1.0/24
#     ▼
#   vm-caller (10.0.1.20:3111)
#     │  iii-http worker receives the request
#     │  RPC call via iii Engine (ws://10.0.1.10:49134)
#     ▼
#   vm-inference (10.0.1.30)
#     │  Python runs Gemma 270M inference
#     └──── returns text response back through the same RPC chain
##############################################################################

server {
    # Listen on port 80 (HTTP).
    # Port 443 (HTTPS) can be added with Certbot later.
    listen 80;

    # "_" is nginx's wildcard: match any hostname or bare IP.
    # This makes the server work whether clients use the public IP
    # directly or a custom domain name you point at it.
    server_name _;

    # ── Logging ───────────────────────────────────────────────────────────────
    # Separate log files for this virtual host make debugging easier.
    # View with: sudo tail -f /var/log/nginx/gateway-access.log
    access_log /var/log/nginx/gateway-access.log;
    error_log  /var/log/nginx/gateway-error.log warn;

    # ── Request body size limit ───────────────────────────────────────────────
    # 10 MB allows long chat histories (many messages with long content).
    client_max_body_size 10m;

    # ── Health-check endpoint ──────────────────────────────────────────────────
    # GET /health returns 200 OK without touching the model.
    # Useful for automated monitoring (GCP uptime checks, Prometheus blackbox).
    location /health {
        access_log off;                         # Don't pollute logs with health checks
        add_header Content-Type text/plain;
        return 200 "gateway-ok\n";
    }

    # ── Main API endpoint: POST /v1/chat/completions ───────────────────────────
    # The path matches the OpenAI Chat Completions API path so it's familiar
    # to any developer who has used the OpenAI SDK.
    location /v1/chat/completions {

        # ── Method restriction ─────────────────────────────────────────────────
        # The iii caller-worker only registers a POST handler.
        # Reject everything else with 405 Method Not Allowed.
        limit_except POST OPTIONS {
            deny all;
        }

        # ── CORS pre-flight ────────────────────────────────────────────────────
        # Browsers send an OPTIONS request before a cross-origin POST.
        # We handle it here so it never reaches vm-caller.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin  "*";
            add_header Access-Control-Allow-Methods "POST, OPTIONS";
            add_header Access-Control-Allow-Headers "Content-Type, Authorization";
            add_header Access-Control-Max-Age       86400;
            return 204;                             # 204 No Content
        }

        # ── Upstream: vm-caller's iii-http server ──────────────────────────────
        # proxy_pass forwards the complete HTTP request (URI, headers, body)
        # to the iii-http server running on vm-caller.
        # The iii-http server matches the path "/v1/chat/completions" against
        # registered HTTP triggers and routes to the caller-worker function.
        proxy_pass http://10.0.1.10:3111;

        # ── Request headers forwarded to vm-caller ────────────────────────────
        # These tell the upstream who the real client is.
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host             $http_host;

        # Required for HTTP/1.1 keep-alive compatibility
        proxy_set_header Connection       "";
        proxy_http_version                1.1;

        # ── Timeouts ──────────────────────────────────────────────────────────
        # These must be generous because CPU inference on Gemma 270M can take
        # 30-180 seconds depending on prompt length and max_new_tokens.
        #
        # proxy_connect_timeout: time nginx waits to establish TCP connection
        #                         to vm-caller (should be fast, same subnet)
        proxy_connect_timeout  10s;
        #
        # proxy_send_timeout: time nginx waits between successive sends to upstream
        proxy_send_timeout    180s;
        #
        # proxy_read_timeout: time nginx waits for ONE read from upstream response.
        # This is the critical one — inference takes time, set it >= max generation time.
        proxy_read_timeout    180s;

        # ── Response headers added back to the client ──────────────────────────
        add_header Access-Control-Allow-Origin  "*" always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;

        # ── Buffer settings ────────────────────────────────────────────────────
        # Disable buffering for streaming-ready future use.
        # Currently the response is returned all at once (not streamed).
        proxy_buffering    off;
        proxy_buffer_size  4k;
    }

    # ── Catch-all ──────────────────────────────────────────────────────────────
    # Any path other than /health or /v1/chat/completions gets a clear JSON error.
    location / {
        add_header Content-Type application/json always;
        return 404 '{"error":"not_found","message":"Only POST /v1/chat/completions is available","hint":"Check your request path"}';
    }
}
